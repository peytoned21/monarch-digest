name: Monarch Daily Digest

on:
  schedule:
    # 7:00 AM Eastern = 11:00 AM UTC (12:00 UTC during EDT)
    - cron: '0 12 * * *'
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  send-digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install --upgrade monarchmoney

      - name: Patch monarchmoney API domain
        run: |
          FILE=$(python -c "import monarchmoney.monarchmoney as m; print(m.__file__)")
          sed -i 's|https://api.monarchmoney.com|https://api.monarch.com|g' "$FILE"
          echo "Patched $FILE"

      - name: Run digest script
        env:
          MONARCH_EMAIL:     ${{ secrets.MONARCH_EMAIL }}
          MONARCH_PASSWORD:  ${{ secrets.MONARCH_PASSWORD }}
          MONARCH_MFA_KEY:   ${{ secrets.MONARCH_MFA_KEY }}
          GMAIL_ADDRESS:     ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL:   ${{ secrets.RECIPIENT_EMAIL }}
        run: python monarch_digest.py
